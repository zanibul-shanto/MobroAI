name: API CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/MobroLens.Tests/**'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'apps/MobroLens.Tests/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore MobroLens.sln

      - name: Build
        run: dotnet build MobroLens.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test MobroLens.sln --configuration Release --no-build --verbosity normal
               --logger "trx;LogFileName=test-results.trx"
               --results-directory ./TestResults

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Tests
          path: apps/api/TestResults/*.trx
          reporter: dotnet-trx
